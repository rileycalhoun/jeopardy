services:
  database:
    image: postgres:18
    restart: always
    shm_size: 128mb
    volumes:
      - postgres:/var/lib/postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: docker
    ports:
      - "5432:5432"

  redis:
    image: redis:8-alpine
    restart: always
    ports:
      - "6379:6379"

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - 8000:8080
    depends_on:
      - database

  backend:
    image: jeopardy-clone-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./data:/data
      - backend-target:/app/target
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    environment:
      DATABASE_URL: postgres://postgres:password@database:5432/docker
      REDIS_URL: redis://redis:6379
      RUST_LOG: debug
      LOG_FORMAT: pretty
      BIND_ADDRESS: 0.0.0.0
      BIND_PORT: 8080
      FRONTEND_ORIGIN: http://localhost:5173
    command: cargo watch -x run
    depends_on:
      - database
      - redis

  frontend:
    image: jeopardy-clone-frontend-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      PUBLIC_API_URL: http://localhost:8080
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  postgres:
  backend-target:
  cargo-registry:
  cargo-git:
  frontend-node-modules:
