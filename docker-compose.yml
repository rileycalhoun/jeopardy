services:
  database:
    image: postgres:18
    restart: always
    shm_size: 128mb
    volumes:
      - postgres:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-docker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:8-alpine
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrator
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-docker}}
    depends_on:
      database:
        condition: service_healthy

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "${ADMINER_PORT:-8000}:8080"
    depends_on:
      - database

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-docker}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RUST_LOG: ${RUST_LOG:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      BIND_ADDRESS: 0.0.0.0
      BIND_PORT: 8080
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      QUESTION_PACK_DIR: /app/question-packs
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - backend

volumes:
  postgres:
