services:
  database:
    image: postgres:18
    restart: always
    shm_size: 128mb
    volumes:
      - postgres:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-docker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "${ADMINER_PORT:-8000}:8080"
    depends_on:
      - database

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-docker}}
      RUST_LOG: ${RUST_LOG:-info}
      BIND_ADDRESS: 0.0.0.0
      BIND_PORT: 8080
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      QUESTION_PACK_DIR: /app/question-packs
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - backend

volumes:
  postgres:
