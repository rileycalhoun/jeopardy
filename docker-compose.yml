services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./data:/data
      - backend-target:/app/target
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    environment:
      DATABASE_URL: sqlite:/data/jeopardy.sqlite
      RUST_LOG: debug
      BIND_ADDRESS: 0.0.0.0
      BIND_PORT: 8080
    command: cargo watch -x run

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
volumes:
  backend-target:
  cargo-registry:
  cargo-git:
  frontend-node-modules:
